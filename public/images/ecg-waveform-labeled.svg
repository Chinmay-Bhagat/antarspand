<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" width="640" height="250">
  <defs>
    <filter id="glow-e">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-r" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0c040"/>
    </marker>
    <marker id="arr-l" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0c040"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="250" fill="#080910" rx="10"/>

  <!-- Baseline grid -->
  <line x1="55" y1="122" x2="590" y2="122" stroke="#1a1d2e" stroke-width="1"/>

  <!-- ECG waveform (same path as rj-interval.svg) -->
  <path d="M 55,122
           L 118,122
           C 123,122 128,96 138,94
           C 148,92 154,122 162,122
           C 167,122 171,132 175,135
           C 177,136 180,52 182,36
           C 184,20 186,133 189,137
           C 192,140 198,122 210,122
           L 233,122
           C 241,122 251,84 261,82
           C 271,80 281,122 291,122
           L 585,122"
    fill="none" stroke="#00dfa0" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow-e)"/>

  <!-- P wave label -->
  <line x1="138" y1="84" x2="138" y2="93" stroke="#b8beca" stroke-width="1" stroke-dasharray="2,2" opacity="0.45"/>
  <text x="138" y="78" fill="#b8beca" font-family="IBM Plex Mono,monospace" font-size="14" text-anchor="middle" font-weight="600">P</text>

  <!-- Q label -->
  <text x="170" y="153" fill="#b8beca" font-family="IBM Plex Mono,monospace" font-size="13" text-anchor="middle">Q</text>

  <!-- R label (highlighted teal) -->
  <line x1="182" y1="28" x2="182" y2="36" stroke="#00dfa0" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="182" y="22" fill="#00dfa0" font-family="IBM Plex Mono,monospace" font-size="15" text-anchor="middle" font-weight="700">R</text>

  <!-- S label -->
  <text x="193" y="157" fill="#b8beca" font-family="IBM Plex Mono,monospace" font-size="13" text-anchor="middle">S</text>

  <!-- T wave label -->
  <line x1="261" y1="72" x2="261" y2="81" stroke="#b8beca" stroke-width="1" stroke-dasharray="2,2" opacity="0.45"/>
  <text x="261" y="66" fill="#b8beca" font-family="IBM Plex Mono,monospace" font-size="14" text-anchor="middle" font-weight="600">T</text>

  <!-- PR interval bracket -->
  <line x1="118" y1="173" x2="162" y2="173" stroke="#f0c040" stroke-width="1"
    marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="140" y="168" fill="#f0c040" font-family="IBM Plex Mono,monospace" font-size="9" text-anchor="middle">PR interval</text>

  <!-- QRS duration bracket -->
  <line x1="168" y1="185" x2="210" y2="185" stroke="#f0c040" stroke-width="1"
    marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="189" y="180" fill="#f0c040" font-family="IBM Plex Mono,monospace" font-size="9" text-anchor="middle">QRS</text>

  <!-- QT interval bracket -->
  <line x1="168" y1="200" x2="291" y2="200" stroke="#f0c040" stroke-width="1"
    marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="230" y="195" fill="#f0c040" font-family="IBM Plex Mono,monospace" font-size="9" text-anchor="middle">QT interval</text>

  <!-- Phase description text -->
  <text x="138" y="228" fill="#4a5568" font-family="IBM Plex Mono,monospace" font-size="10" text-anchor="middle">atrial depol.</text>
  <text x="189" y="228" fill="#4a5568" font-family="IBM Plex Mono,monospace" font-size="10" text-anchor="middle">ventricular depol.</text>
  <text x="261" y="228" fill="#4a5568" font-family="IBM Plex Mono,monospace" font-size="10" text-anchor="middle">ventricular repol.</text>

  <!-- ST segment label -->
  <text x="221" y="114" fill="#7c8494" font-family="IBM Plex Mono,monospace" font-size="10" text-anchor="middle">ST</text>

  <!-- ECG section label -->
  <text x="57" y="116" fill="#7c8494" font-family="IBM Plex Mono,monospace" font-size="11">ECG</text>
</svg>
